<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk - SIGMA CLUB</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"/>
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html">⚡ SIGMACLUB</a>
    </div>
    <h2>AKSES MASUK</h2>
    <p class="auth-sub">Selamat datang kembali, petarung kasta tertinggi.</p>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Identitas Pengguna</label>
        <input type="text" id="username" name="username" placeholder="Masukkan nama pengguna..." required/>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Kata Sandi Rahasia</label>
        <input type="password" id="password" name="password" placeholder="********" required/>
      </div>
      <button type="submit" class="btn-auth">VERIFIKASI SIGMA</button>
    </form>

    <p class="auth-switch">
      Belum terdaftar? <a href="daftar.html">Daftar sekarang</a>
    </p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
