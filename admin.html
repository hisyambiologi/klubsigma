<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - SIGMA CLUB</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"/>
</head>
<body class="auth-body">

  <div class="auth-container admin-container">
    <div class="auth-brand">
      <a href="index.html">⚡ SIGMACLUB</a>
    </div>
    <h2>PUSAT KENDALI PENGELOLA</h2>
    <p class="auth-sub">Akses terbatas — hanya untuk admin terpilih.</p>

    <form id="adminForm" class="auth-form">
      <div class="form-group">
        <label for="username"><i class="fas fa-shield-alt"></i> Nama Pengelola</label>
        <input type="text" id="username" name="username" placeholder="Masukkan nama pengelola..." required/>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-key"></i> Kata Sandi</label>
        <input type="password" id="password" name="password" placeholder="********" required/>
      </div>
      <button type="submit" class="btn-auth btn-admin">BUKA SISTEM</button>
    </form>

    <p class="auth-switch">
      <a href="index.html">← Kembali ke Beranda</a>
    </p>
  </div>

  <script src="js/login.js"></script>
  <script>
    // Override form untuk admin
    document.getElementById('adminForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('[herisusanta.my.id](https://herisusanta.my.id/javalogin/api/)', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.status === 'success' && username === 'admin') {
          sessionStorage.setItem('loggedIn', 'true');
          sessionStorage.setItem('username', data.username || username);
          sessionStorage.setItem('role', 'admin');
          alert('Selamat datang, Admin! Akses sistem berhasil dibuka.');
          window.location.href = 'index.html';
        } else if (data.status === 'success') {
          alert('Akun ini bukan akun admin!');
        } else {
          alert('Nama pengelola atau kata sandi salah!');
        }
      } catch (err) {
        alert('Gagal terhubung ke server. Coba lagi nanti.');
      }
    });
  </script>
</body>
</html>
